<!DOCTYPE html>
<html>
<head>
    <title>Perfil de {{ nombre }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="info">
        <h1>Perfil de {{ nombre }}</h1>
        <p><strong>Edad:</strong> {{ edad }} años</p>
           {% if edad>=18 %}
                <span class="mayor">Mayor de edad</span> 
            {% else %}
                <span class="menor">Menor de edad</span>
            {% endif %}
 

        <p><strong>Estado civil:</strong> 
            {% if casado %}
                <span class="casado">✅ Casado/a</span>
            {% else %}
                <span class="soltero">💙 Soltero/a</span>
            {% endif %}
        </p>
        <p><strong>Hobbies:</strong></p>
        <ul>
            {% for hobby in hobbies %}
                <li>{{ hobby }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
